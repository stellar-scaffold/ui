version: 1

# Scaffold CLI Configuration
config:
  # Your Rust/Soroban contract source.
  # contracts_dir: contracts

  # The generated TypeScript contract layer your app imports. The CLI writes
  # and regenerates everything here on build/redeploy, so you normally don't
  # edit it by hand:
  #   - app-lib/clients/<name>/   one generated Binding package per contract
  #   - app-lib/clients/index.ts  one flattened file that instantiates every
  #                               Contract Client, imported in app code as
  #                               `@stellar-scaffold/app-lib/clients`
  # To customize a client, import it into your own code under app/ instead of
  # editing the generated file. Everything here is gitignored except .gitkeep.
  # clients_dir: app-lib/clients
